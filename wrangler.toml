name = "it-toolbox"
compatibility_date = "2026-04-13"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "dist"

[vars]
ENVIRONMENT = "production"

# ============================================================
# 配置说明
# 
# 1. 生产部署：推荐在 Cloudflare Dashboard 中绑定资源
#    路径：Workers & Pages → 项目 → Settings → Functions
#    无需创建此配置文件
#
# 2. 本地开发：复制此文件为 wrangler.toml 并填入配置
#    cp wrangler.example.toml wrangler.toml
#
# 3. wrangler.toml 已加入 .gitignore，不会被提交
# ============================================================

[[kv_namespaces]]
binding = "CACHE"
id = "85d7c9bae7cd400eb47b9e9b403899b8"
# preview_id = "YOUR_PREVIEW_KV_ID_HERE"



[ai]
binding = "AI"

# Secrets (通过 Dashboard 或 wrangler secret put 配置)
# EXCHANGE_API_KEY